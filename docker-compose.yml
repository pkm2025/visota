services:
  # ===== Django App =====
  web:
    build: .
    container_name: visota-web
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DB_HOST=db
      - DB_PORT=3306
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./logs:/var/log/visota
    depends_on:
      db:
        condition: service_healthy
    networks:
      - visota-net

  # ===== django-q2 Worker =====
  worker:
    build: .
    container_name: visota-worker
    restart: unless-stopped
    command: python manage.py qcluster
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DB_HOST=db
      - DB_PORT=3306
    volumes:
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - visota-net

  # ===== MariaDB =====
  db:
    image: mariadb:11.4
    container_name: visota-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-changeme}
      - MYSQL_DATABASE=${DB_NAME:-visota}
      - MYSQL_USER=${DB_USER:-visota}
      - MYSQL_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb.cnf:/etc/mysql/mariadb.conf.d/99-visota.cnf:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - visota-net

  # ===== Nginx Reverse Proxy =====
  nginx:
    image: nginx:alpine
    container_name: visota-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - visota-net

volumes:
  db_data:
  static_files:
  media_files:

networks:
  visota-net:
    driver: bridge
