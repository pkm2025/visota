name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy django-stubs
      - run: ruff check apps/ --exit-zero
      - run: ruff format --check apps/ || true

  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: rootpass
          MARIADB_DATABASE: pmketoan_test
          MARIADB_USER: pmketoan
          MARIADB_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      TEST_DB_NAME: pmketoan_test
      TEST_DB_USER: root
      TEST_DB_PASSWORD: rootpass
      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: 3306
      SECRET_KEY: ci-secret-key-for-testing-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libmariadb-dev \
            libxml2-dev libxslt1-dev libpango-1.0-0 libpangoft2-1.0-0 \
            libffi-dev libcairo2 libgdk-pixbuf-2.0-0
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Run migrations
        run: python manage.py migrate --run-syncdb
      - name: Run tests with timing
        run: pytest tests/ --ignore=tests/e2e -n auto --no-cov -q --durations=20
        timeout-minutes: 15

      - name: Check coverage threshold
        run: pytest tests/ --ignore=tests/e2e --cov=apps --cov-fail-under=30 --cov-report=term-missing -q --no-header
        timeout-minutes: 15

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
          retention-days: 30

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install vulture deptry ruff
      - name: Dead code analysis (vulture)
        run: vulture apps/ --min-confidence 80 || true
      - name: Unused dependencies (deptry)
        run: deptry . || true
      - name: Duplicate code (jscpd via npx)
        run: npx --yes jscpd@1 src apps/ --min-lines 8 || true

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit -r requirements.txt --ignore-vuln GHSA-XXXX
        continue-on-error: true
