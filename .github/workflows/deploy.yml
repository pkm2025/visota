name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy notification
        run: |
          echo "Deploy triggered by commit ${{ github.sha }}"
          echo "Deployment would run: ssh deploy@visota.net 'cd /opt/visota && git pull && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && systemctl restart visota'"
