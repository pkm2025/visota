name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Create release tag
        run: |
          VERSION="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          echo "Creating release $VERSION"
          gh release create "$VERSION" --title "$VERSION" --notes "Auto-release from commit ${{ github.sha }}" --target main || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t visota:latest .
          docker tag visota:latest ghcr.io/pkm2025/visota:latest
          echo "Docker image built. Push to registry when configured."
        continue-on-error: true

      - name: Deploy notification
        run: |
          echo "Deploy triggered by commit ${{ github.sha }}"
          echo "Deployment would run: ssh deploy@visota.net 'cd /opt/visota && git pull && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && systemctl restart visota'"
