[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    e2e: end-to-end browser tests via Playwright
testpaths = tests/e2e
addopts = -v --tb=short -p no:playwright --html=tests/e2e/report.html --self-contained-html
