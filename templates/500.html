{% extends 'modern/base/layout.html' %}

{% block title %}Lỗi server — {{ brand.name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-sm">
                <div class="card-body py-5">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 80px;"></i>
                    <h1 class="mt-3 mb-2" style="font-size: 56px; line-height: 1;">500</h1>
                    <h2 class="h4 mb-2">Lỗi server</h2>
                    <p class="text-muted mb-4">
                        Hệ thống gặp lỗi không mong muốn. Chúng tôi đã ghi nhận
                        và sẽ xử lý sớm. Vui lòng thử lại sau.
                    </p>
                    <a href="{% url 'ui_modern:dashboard' %}" class="btn btn-primary">
                        <i class="bi bi-house"></i> Quay lại trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
