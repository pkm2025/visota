{% extends 'modern/base/layout.html' %}

{% block content %}
<div class="container-fluid py-4">
    <div class="mb-3">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1">
                <li class="breadcrumb-item"><a href="{% url 'ui_modern:dashboard' %}">Trang chủ</a></li>
                <li class="breadcrumb-item"><a href="{% url 'ui_modern:asset_list' %}">Tài sản</a></li>
                <li class="breadcrumb-item active">Điều chuyển</li>
            </ol>
        </nav>
        <h1 class="h3 mb-0">{{ page_title }}</h1>
    </div>

    <div class="card"><div class="card-body">
        <p>Điều chuyển <strong>{{ asset.asset_code }} - {{ asset.asset_name }}</strong>
            từ <em>{{ asset.using_department.name }}</em> đến bộ phận mới:</p>
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Bộ phận nhận</label>
                    <select name="to_department" class="form-select" required>
                        <option value="">— Chọn —</option>
                        {% for d in departments %}
                            {% if d.pk != asset.using_department.pk %}
                            <option value="{{ d.pk }}">{{ d.code }} - {{ d.name }}</option>
                            {% endif %}
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">TK chi phí mới (tùy chọn)</label>
                    <input type="text" name="new_expense_account" class="form-control" placeholder="{{ asset.expense_account }}">
                </div>
            </div>
            <div class="text-end mt-3">
                <a href="{% url 'ui_modern:asset_list' %}" class="btn btn-secondary btn-sm">Hủy</a>
                <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-arrow-left-right"></i> Điều chuyển</button>
            </div>
        </form>
    </div></div>
</div>
{% endblock %}
