{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — {{ brand.name }}</title>
    <link rel="icon" href="{{ brand.favicon }}">
    <link rel="stylesheet" href="{% static 'vendor/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/css/bootstrap-icons.min.css' %}">
    <link rel="stylesheet" href="{% static 'shared/css/variables.css' %}">
    <link rel="stylesheet" href="{% static 'modern/css/auth.css' %}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                {% if brand.logo %}
                <img src="{{ brand.logo }}" alt="{{ brand.name }}" height="48">
                {% else %}
                <h2>{{ brand.name }}</h2>
                {% endif %}
            </div>

            <form method="post">
                {% csrf_token %}

                {% if form.errors %}
                <div class="alert alert-danger">
                    Tên đăng nhập hoặc mật khẩu không đúng.
                </div>
                {% endif %}

                <div class="mb-3">
                    <label for="id_username" class="form-label small">Tên đăng nhập</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" id="id_username" class="form-control"
                               placeholder="Tên đăng nhập"
                               value="{{ form.username.value|default:'' }}"
                               autofocus required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="id_password" class="form-label small">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="id_password" class="form-control"
                               placeholder="Mật khẩu" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Đăng nhập
                </button>

                <input type="hidden" name="next" value="{{ next }}">
            </form>

            <div class="auth-footer">
                <small class="text-muted">© 2026 {{ brand.name }}</small>
            </div>
        </div>
    </div>
</body>
</html>
