{% extends "modern/base/layout.html" %}
{% block content %}
<div class="container-fluid py-3">
  {% include 'shared/_breadcrumb.html' %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">{{ page_title }}</h4>
    <div class="btn-group">
      <a href="{% url 'ui_modern:contract_template_list' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Danh sách mẫu
      </a>
      <a href="{% url 'ui_modern:contract_template_generate' template.code contract.id %}"
         class="btn btn-primary btn-sm" target="_blank">
        <i class="bi bi-download"></i> Tải PDF
      </a>
    </div>
  </div>
  <div class="card">
    <div class="card-body">
      <iframe srcdoc="{{ rendered_html|escape }}" style="width:100%;height:80vh;border:1px solid #dee2e6"></iframe>
    </div>
  </div>
</div>
{% endblock %}
