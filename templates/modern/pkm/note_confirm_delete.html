{% extends 'modern/pkm/base_pkm.html' %}

{% block pkm_content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-1">
        <li class="breadcrumb-item"><a href="{% url 'ui_modern:dashboard' %}">Trang chủ</a></li>
        <li class="breadcrumb-item"><a href="{% url 'ui_modern:pkm_dashboard' %}">Tri thức cá nhân</a></li>
        <li class="breadcrumb-item"><a href="{% url 'ui_modern:pkm_note_list' %}">Ghi chú</a></li>
        <li class="breadcrumb-item active">Xóa ghi chú</li>
    </ol>
</nav>
<h1 class="h3 mb-3">{{ page_title }}</h1>

<div class="card border-0 shadow-sm">
    <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
        <h4 class="mt-3">Xác nhận xóa ghi chú</h4>
        <p class="text-muted">
            Bạn có chắc chắn muốn xóa ghi chú <strong>"{{ note.title }}"</strong>?
            Hành động này không thể hoàn tác.
        </p>
        <form method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash"></i> Xóa vĩnh viễn
            </button>
        </form>
        <a href="{% url 'ui_modern:pkm_note_detail' note.pk %}" class="btn btn-outline-secondary">
            Hủy
        </a>
    </div>
</div>
{% endblock %}
