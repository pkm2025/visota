{% extends 'modern/base/layout.html' %}

{% block content %}
<div class="container py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-2">
            <li class="breadcrumb-item"><a href="{% url 'ui_modern:dashboard' %}">Trang chủ</a></li>
            <li class="breadcrumb-item"><a href="{% url 'ui_modern:crm_ticket_list' %}">Chăm sóc khách hàng</a></li>
            <li class="breadcrumb-item active">{{ page_title }}</li>
        </ol>
    </nav>
    <h1 class="h3 mb-4">{{ page_title }}</h1>
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}<div class="alert alert-danger py-2">{% for f, e in form.errors.items %}<strong>{{ f }}:</strong> {{ e|join:", " }}{% endfor %}</div>{% endif %}
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Mã <span class="text-danger">*</span></label>
                        <input type="text" name="code" value="{{ form.code.value|default:'' }}" class="form-control font-mono" required>
                    </div>
                    <div class="col-md-9">
                        <label class="form-label">Chủ đề <span class="text-danger">*</span></label>
                        <input type="text" name="subject" value="{{ form.subject.value|default:'' }}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Mã khách hàng</label>
                        <input type="text" name="customer_code" value="{{ form.customer_code.value|default:'' }}" class="form-control font-mono">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Tên khách hàng</label>
                        <input type="text" name="customer_name" value="{{ form.customer_name.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Người liên hệ</label>
                        <input type="text" name="contact_name" value="{{ form.contact_name.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" name="contact_email" value="{{ form.contact_email.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Điện thoại</label>
                        <input type="text" name="contact_phone" value="{{ form.contact_phone.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Mức ưu tiên</label>
                        <select name="priority" class="form-select">
                            {% for p in form.priority.field.choices %}<option value="{{ p.0 }}" {% if form.priority.value == p.0 %}selected{% endif %}>{{ p.1 }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Trạng thái</label>
                        <select name="status" class="form-select">
                            {% for s in form.status.field.choices %}<option value="{{ s.0 }}" {% if form.status.value == s.0 %}selected{% endif %}>{{ s.1 }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Diễn giải</label>
                        <textarea name="description" rows="4" class="form-control">{{ form.description.value|default:'' }}</textarea>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Lưu</button>
                    <a href="{% url 'ui_modern:crm_ticket_list' %}" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
