{% extends 'modern/base/layout.html' %}

{% block content %}
<div class="container py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-2">
            <li class="breadcrumb-item"><a href="{% url 'ui_modern:dashboard' %}">Trang chủ</a></li>
            <li class="breadcrumb-item">CRM</li>
            <li class="breadcrumb-item active">{{ page_title }}</li>
        </ol>
    </nav>
    <h1 class="h3 mb-4">{{ page_title }}</h1>
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}<div class="alert alert-danger py-2">{% for f, e in form.errors.items %}<strong>{{ f }}:</strong> {{ e|join:", " }}{% endfor %}</div>{% endif %}
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Mã <span class="text-danger">*</span></label>
                        <input type="text" name="code" value="{{ form.code.value|default:'' }}" class="form-control font-mono" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Tên <span class="text-danger">*</span></label>
                        <input type="text" name="name" value="{{ form.name.value|default:'' }}" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Mã số thuế</label>
                        <input type="text" name="tax_code" value="{{ form.tax_code.value|default:'' }}" class="form-control font-mono">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Điện thoại</label>
                        <input type="text" name="phone" value="{{ form.phone.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" value="{{ form.email.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Website</label>
                        <input type="text" name="website" value="{{ form.website.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Ngành nghề</label>
                        <input type="text" name="industry" value="{{ form.industry.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Địa chỉ</label>
                        <textarea name="address" rows="2" class="form-control">{{ form.address.value|default:'' }}</textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Diễn giải</label>
                        <textarea name="description" rows="2" class="form-control">{{ form.description.value|default:'' }}</textarea>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Lưu</button>
                    <a href="{% url 'ui_modern:crm_opportunity_list' %}" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
