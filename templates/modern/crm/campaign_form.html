{% extends 'modern/base/layout.html' %}

{% block content %}
<div class="container py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-2">
            <li class="breadcrumb-item"><a href="{% url 'ui_modern:dashboard' %}">Trang chủ</a></li>
            <li class="breadcrumb-item"><a href="{% url 'ui_modern:crm_campaign_list' %}">Chiến dịch</a></li>
            <li class="breadcrumb-item active">{{ page_title }}</li>
        </ol>
    </nav>
    <h1 class="h3 mb-4">{{ page_title }}</h1>
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}<div class="alert alert-danger py-2">{% for f, e in form.errors.items %}<strong>{{ f }}:</strong> {{ e|join:", " }}{% endfor %}</div>{% endif %}
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Mã <span class="text-danger">*</span></label>
                        <input type="text" name="code" value="{{ form.code.value|default:'' }}" class="form-control font-mono" required>
                    </div>
                    <div class="col-md-9">
                        <label class="form-label">Tên <span class="text-danger">*</span></label>
                        <input type="text" name="name" value="{{ form.name.value|default:'' }}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Loại</label>
                        <select name="campaign_type" class="form-select">
                            {% for t in form.campaign_type.field.choices %}<option value="{{ t.0 }}" {% if form.campaign_type.value == t.0 %}selected{% endif %}>{{ t.1 }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Trạng thái</label>
                        <select name="status" class="form-select">
                            {% for s in form.status.field.choices %}<option value="{{ s.0 }}" {% if form.status.value == s.0 %}selected{% endif %}>{{ s.1 }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Ngân sách</label>
                        <input type="number" name="budget" value="{{ form.budget.value|default:'0' }}" class="form-control text-end font-mono" step="1">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Chi phí thực</label>
                        <input type="number" name="actual_cost" value="{{ form.actual_cost.value|default:'0' }}" class="form-control text-end font-mono" step="1">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Ngày bắt đầu</label>
                        <input type="date" name="start_date" value="{{ form.start_date.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Ngày kết thúc</label>
                        <input type="date" name="end_date" value="{{ form.end_date.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Diễn giải</label>
                        <textarea name="description" rows="3" class="form-control">{{ form.description.value|default:'' }}</textarea>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Lưu</button>
                    <a href="{% url 'ui_modern:crm_campaign_list' %}" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
