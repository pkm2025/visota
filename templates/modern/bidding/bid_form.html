{% extends 'modern/base/layout.html' %}

{% block content %}
<div class="container-fluid py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-1">
            <li class="breadcrumb-item"><a href="{% url 'ui_modern:dashboard' %}">Trang chủ</a></li>
            <li class="breadcrumb-item"><a href="{% url 'ui_modern:bid_list' %}">Đấu thầu</a></li>
            <li class="breadcrumb-item active">{{ page_title }}</li>
        </ol>
    </nav>
    <h1 class="h3 mb-3">{{ page_title }}</h1>

    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <label class="form-label">Mã gói thầu <span class="text-danger">*</span></label>
                        <input type="text" name="bid_no" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Tên gói thầu <span class="text-danger">*</span></label>
                        <input type="text" name="bid_name" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Chủ đầu tư <span class="text-danger">*</span></label>
                        <input type="text" name="investor_name" class="form-control" required>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <label class="form-label">MST chủ đầu tư</label>
                        <input type="text" name="investor_tax_code" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Phương thức</label>
                        <select name="bid_method" class="form-select">
                            {% for v, label in bid_methods %}
                            <option value="{{ v }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Hình thức</label>
                        <select name="bid_form" class="form-select">
                            {% for v, label in bid_forms %}
                            <option value="{{ v }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Loại gói</label>
                        <select name="bid_type" class="form-select">
                            <option value="construction">Xây lắp</option>
                            <option value="goods">Hàng hóa</option>
                            <option value="services">Dịch vụ</option>
                            <option value="consulting">Tư vấn</option>
                            <option value="mixed">Hỗn hợp</option>
                        </select>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <label class="form-label">Giá gói thầu</label>
                        <input type="number" step="any" name="bid_package_price" class="form-control" value="0">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Loại tiền</label>
                        <input type="text" name="currency_code" class="form-control" value="VND" maxlength="3">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Số ngày thực hiện</label>
                        <input type="number" name="duration_days" class="form-control" value="0">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Ngày đăng thông báo</label>
                        <input type="date" name="published_at" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" name="is_online" value="1" id="is_online" checked>
                            <label class="form-check-label" for="is_online">Trực tuyến</label>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Hạn nộp HSDT</label>
                        <input type="datetime-local" name="bid_submission_deadline" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Mã trên Hệ thống mạng</label>
                        <input type="text" name="bid_system_ref" class="form-control" placeholder="muasamcong.mpi.gov.vn">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Diễn giải</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Lưu
                    </button>
                    <a href="{% url 'ui_modern:bid_list' %}" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
