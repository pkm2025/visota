{% extends 'modern/base/layout.html' %}

{% block title %}Không có quyền — {{ brand.name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-sm">
                <div class="card-body py-5">
                    <i class="bi bi-shield-lock text-danger" style="font-size: 80px;"></i>
                    <h1 class="mt-3 mb-2" style="font-size: 56px; line-height: 1;">403</h1>
                    <h2 class="h4 mb-2">Không có quyền truy cập</h2>
                    <p class="text-muted mb-4">
                        Bạn không được cấp quyền xem trang này.
                        Vui lòng liên hệ quản trị viên nếu cần thêm quyền.
                    </p>
                    <a href="{% url 'ui_modern:dashboard' %}" class="btn btn-primary">
                        <i class="bi bi-house"></i> Quay lại trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
