upstream django {
    server web:8900;
}

server {
    listen 80;
    server_name visota.net www.visota.net localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name visota.net www.visota.net localhost;

    # SSL — replace with Let's Encrypt certs
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # If no certs yet, comment out ssl lines above and uncomment:
    # listen 80;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files (private)
    location /media/ {
        alias /app/media/;
        access_log off;
    }

    # Service Worker (no cache)
    location = /static/sw.js {
        alias /app/staticfiles/sw.js;
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # Django app
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check
    location /health/ {
        proxy_pass http://django;
        access_log off;
    }

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json text/html;
    gzip_min_length 1000;
}
