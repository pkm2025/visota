# ============================================================
#  Visota Observability — Single URL: mon.visota.net
#  CrowdSec + Beszel (internal) + Homepage (1 Traefik route)
#  Total: ~100MB RAM, <1% CPU
# ============================================================

services:
  # ===== CrowdSec — IPS + blocklist (internal only) =====
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - COLLECTIONS=crowdsecurity/traefik,crowdsecurity/http-cve,crowdsecurity/whitelist-good-actors
    volumes:
      - /opt/traefik/logs:/var/log/traefik:ro
      - /var/log:/var/log/host:ro
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
    # No Traefik label — internal only (manage via docker exec cscli)
    ports:
      - "127.0.0.1:8080:8080"
    networks: [mon-net]

  # ===== Beszel Hub — metrics UI (internal, accessed via Homepage iframe) =====
  beszel:
    image: henrygd/beszel
    container_name: beszel
    restart: unless-stopped
    volumes:
      - beszel_data:/beszel_data
    # Internal only — Homepage embeds it via iframe
    networks: [mon-net]

  # Beszel agent — collects host + Docker stats
  beszel-agent:
    image: henrygd/beszel-agent
    container_name: beszel-agent
    restart: unless-stopped
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PORT=45876
      - KEY=${BESZEL_AGENT_KEY:-}
    network_mode: host

  # ===== Homepage — THE ONLY external URL =====
  # mon.visota.net shows everything in one page:
  # - Live Docker container stats (CPU/RAM per container)
  # - Beszel iframe (full metrics + historical charts)
  # - CrowdSec stats (blocked IPs counter)
  # - Quick links to Visota admin, Portainer, Traefik
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    volumes:
      - ./homepage-config:/app/config
      - homepage_icons:/app/public/icons
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HOMEPAGE_VAR_DOMAIN=${DOMAIN:-visota.net}
      - HOMEPAGE_VAR_BESZEL=http://beszel:8090
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mon.rule=Host(`mon.${DOMAIN:-visota.net}`)"
      - "traefik.http.routers.mon.entrypoints=websecure"
      - "traefik.http.routers.mon.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mon.middlewares=mon-auth"
      - "traefik.http.services.mon.loadbalancer.server.port=3000"
      # BasicAuth — đổi user/pass:
      #   htpasswd -nbB admin NEWPASSWORD | sed 's/\$/\$\$/g'
      # Default: admin / visota2026
      - "traefik.http.middlewares.mon-auth.basicauth.users=admin:$$2y$$05$$FA5BT.Gr6XAMkNK7J5EOruZQMpckXpiF9LYydesVFX4HDPTWv/KM."
    networks: [web, mon-net]

volumes:
  crowdsec_data:
  crowdsec_config:
  beszel_data:
  homepage_icons:

networks:
  web:
    external: true
  mon-net:
    driver: bridge
