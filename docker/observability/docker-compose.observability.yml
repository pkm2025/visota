# ============================================================
#  Visota Observability Stack — Lean Edition
#  CrowdSec + Beszel + Homepage
#  Total: ~100MB RAM, <1% CPU
# ============================================================

services:
  # ===== 1. CrowdSec — Threat Intelligence + IPS =====
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - COLLECTIONS=crowdsecurity/traefik,crowdsecurity/http-cve,crowdsecurity/whitelist-good-actors
    volumes:
      - /opt/traefik/logs:/var/log/traefik:ro
      - /var/log:/var/log/host:ro
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
    ports:
      - "127.0.0.1:8080:8080"
    networks: [visota-net]

  # ===== 2. Beszel — Lightweight Metrics + Alerts =====
  # Replaces Netdata (150-500MB) with ~30MB total
  # Hub: web UI + SQLite historical data + alerts
  beszel:
    image: henrygd/beszel
    container_name: beszel
    restart: unless-stopped
    volumes:
      - beszel_data:/beszel_data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.beszel.rule=Host(`metrics.${DOMAIN:-visota.net}`)"
      - "traefik.http.routers.beszel.entrypoints=websecure"
      - "traefik.http.routers.beszel.tls.certresolver=letsencrypt"
      - "traefik.http.services.beszel.loadbalancer.server.port=8090"
    networks: [web]

  # Beszel agent — collects CPU/RAM/Disk/Docker stats (~10MB)
  beszel-agent:
    image: henrygd/beszel-agent
    container_name: beszel-agent
    restart: unless-ststopped
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Port 45876 is agent's listen port — hub connects to this
      - PORT=45876
      # Key generated by hub on first run: docker exec beszel /beszel cli add-sys
      - KEY=${BESZEL_AGENT_KEY:-}
    network_mode: host

  # ===== 3. Homepage — Single Pane Dashboard =====
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    volumes:
      - ./homepage-config:/app/config
      - homepage_icons:/app/public/icons
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HOMEPAGE_VAR_DOMAIN=${DOMAIN:-visota.net}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`panel.${DOMAIN:-visota.net}`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls.certresolver=letsencrypt"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
    networks: [web]

volumes:
  crowdsec_data:
  crowdsec_config:
  beszel_data:
  homepage_icons:

networks:
  web:
    external: true
  visota-net:
    external: true
