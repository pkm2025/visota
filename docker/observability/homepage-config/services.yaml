---
# Homepage services — mon.visota.net
# Beszel + CrowdSec ở internal network, Homepage iframe/widget hiển thị

# System metrics (Beszel iframe)
- Giám sát hệ thống:
    - Beszel Metrics:
        href: http://beszel:8090
        description: CPU / RAM / Disk / Docker real-time
        widget:
            type: customapi
            url: http://beszel:8090/api/stats
            method: GET
            mappings:
                - label: CPU
                  field: cpu
                  format: percent
                - label: RAM
                  field: memory
                  format: percent
                - label: Disk
                  field: disk
                  format: percent

    - CrowdSec:
        href: http://crowdsec:8080
        description: Blocked IPs + threat intel
        widget:
            type: crowdsec
            url: http://crowdsec:8080
            username: ${HOMEPAGE_FILE CrowdSec_USERNAME}
            password: ${HOMEPAGE_FILE CrowdSec_PASSWORD}
            fields: ["alerts", "decisions"]

    - Docker:
        widget:
            type: docker
            fields: ["containers_running", "containers_total", "images"]

# Visota
- Visota:
    - ERP:
        href: https://${DOMAIN}/modern/
        description: Admin dashboard
        icon: si-django
        statusStyle: dot
    - Landing:
        href: https://${DOMAIN}/
        description: visota.net
        icon: si-website
    - Signup:
        href: https://${DOMAIN}/signup/
        description: Đăng ký mới
        icon: si-user-plus

# Infra
- Hạ tầng:
    - Portainer:
        href: https://docker.${DOMAIN}
        description: Docker management
        icon: si-docker
    - Traefik:
        href: http://localhost:8080
        description: Reverse proxy dashboard
        icon: si-traefik
