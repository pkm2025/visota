# DEV ONLY — dùng cho local/dev. Production dùng compose do visota-ctl sinh
# (visota-web/visota-db/worker + Traefik labels). KHÔNG deploy file này lên prod.
services:
  mariadb:
    image: mariadb:11.4
    container_name: visota-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: visota
      MARIADB_USER: visota
      MARIADB_PASSWORD: devpass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: visota-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mariadb_data:
